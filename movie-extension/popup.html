<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<style>
  body { width: 280px; font-family: system-ui, sans-serif; padding: 12px; margin: 0; }
  h3 { margin: 0 0 8px; font-size: 14px; }
  label { display: block; font-size: 11px; color: #555; margin: 8px 0 2px; }
  input { width: 100%; box-sizing: border-box; padding: 6px; font-size: 12px; border: 1px solid #ccc; border-radius: 6px; }
  .row { display: flex; gap: 6px; margin-top: 10px; }
  button { flex: 1; padding: 8px; font-size: 13px; border: 0; border-radius: 6px; cursor: pointer; }
  #start { background: #5865F2; color: #fff; }
  #stop { background: #ed4245; color: #fff; }
  #status { margin-top: 10px; font-size: 12px; color: #333; min-height: 16px; }
  .hint { font-size: 10px; color: #888; margin-top: 2px; }
</style>
</head>
<body>
  <h3>🎬 캐릭터랑 같이보기</h3>
  <label>SillyTavern 주소 (예: https://my-st.com)</label>
  <input id="base" placeholder="https://..." />
  <label>토큰 (config.json의 movieToken)</label>
  <input id="token" type="password" placeholder="movieToken" />
  <label>캐릭터 이름 (누구랑 볼지)</label>
  <input id="character" placeholder="예: Simon Riley" />
  <label>영화 이름 (비우면 자동감지)</label>
  <input id="movie" placeholder="예: 화이트 칙스" />
  <label style="display:flex;align-items:center;gap:6px;margin-top:10px;">
    <input type="checkbox" id="group" style="width:auto;" /> 단톡으로 보기 (그 시트 단톡 멤버 전원)
  </label>
  <div class="hint">넷플/유튜브/디즈니+ 영상 탭에서 눌러주세요. 자막을 켜야 따라갑니다. 단톡은 ST 확장에 단톡 설정이 먼저 있어야 함.</div>
  <div class="row">
    <button id="start">▶ 같이보기 시작</button>
    <button id="stop">■ 종료</button>
  </div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
